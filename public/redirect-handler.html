<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      const hash = window.location.hash.substring(1); // remove '#'
      const queryString = "?" + hash;
      const targetUrl = "/recover" + queryString;
      window.location.replace(targetUrl);
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
